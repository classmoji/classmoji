# fly.toml app configuration file generated for classmoji-webapp on 2026-01-07T14:41:15-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'classmoji-webapp'
primary_region = 'iad'

[build]

[deploy]
  # Run migrations over Neon's DIRECT (unpooled) endpoint — strip "-pooler" from
  # the host. Prisma's advisory lock is session-scoped and breaks under the
  # pooler's transaction pooling (intermittent P1002 lock timeouts). Retry a few
  # times to ride out Neon compute cold-starts. The app still uses the pooled
  # DATABASE_URL at runtime; only this migration step uses the direct connection.
  release_command = "sh -c 'cd packages/database && export DATABASE_URL=$(echo \"$DATABASE_URL\" | sed s/-pooler//); for i in 1 2 3; do npx prisma migrate deploy && exit 0; echo \"migrate attempt $i failed, retrying in 10s\"; sleep 10; done; exit 1'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[env]
  HOST = "0.0.0.0"
  PORT = "8080"

[[vm]]
  memory = '1gb'
  cpus = 1
