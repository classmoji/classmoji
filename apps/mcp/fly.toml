# fly.toml app configuration file for classmoji-mcp
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Staging/dev deploys reuse this file with `--app classmoji-mcp-staging` /
# `--app classmoji-mcp-dev` (see .github/workflows/deploy-fly-*.yml), so
# nothing per-environment may live in [env]. Per-env config (MCP_PUBLIC_URL,
# DATABASE_URL, BETTER_AUTH_SECRET, WEBAPP_URL, TRIGGER_SECRET_KEY, ...) is
# set as Fly secrets on each app.
#
# S8: ENABLE_TEST_LOGIN must NEVER appear here — enforced by the
# mcp-devmint-guard CI workflow.

app = 'classmoji-mcp'
primary_region = 'iad'

[build]

[env]
  MCP_PORT = '8100'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8100
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
