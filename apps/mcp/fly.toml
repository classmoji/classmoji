# fly.toml app configuration file for classmoji-mcp
#
# See https://fly.io/docs/reference/configuration/ for information about how
# to use this file.
#

app = 'classmoji-mcp'
primary_region = 'iad'

[build]

[env]
  HOST = '0.0.0.0'
  PORT = '8100'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8100
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  # Single VM for v1 — rate limiter is in-memory, so horizontal scale needs
  # Redis first (see plan §Open Decisions).

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
